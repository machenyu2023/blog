baseURL = 'https://machenyu2023.github.io/blog/'
locale = 'zh-cn'
defaultContentLanguage = 'zh-cn'
title = 'Mark 的个人博客'

[params]
  author = 'Mark'
  subtitle = '学术笔记与阅读札记'
  description = '记录逻辑与写作、地理与遥感、优化与算法相关的阅读笔记、方法总结与研究思考。'
  math = true

  [params.license]
    name = '署名-非商业性使用-禁止演绎 4.0 国际'
    abbr = 'CC BY-NC-ND 4.0'
    url = 'https://creativecommons.org/licenses/by-nc-nd/4.0/deed.zh-hans'

  [[params.categories]]
    name = '逻辑与写作'
    slug = 'logic-writing'
    description = '论证结构、学术写作、阅读方法与表达训练。'

  [[params.categories]]
    name = '地理与遥感'
    slug = 'geo-remote-sensing'
    description = '遥感原理、空间分析、地理数据与地学应用实践。'

  [[params.categories]]
    name = '优化与算法'
    slug = 'optimization-algorithms'
    description = '最优化方法、机器学习算法与数值实现笔记。'

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$'], ['%$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]
  [markup.highlight]
    noClasses = false
