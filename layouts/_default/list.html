{{ define "main" }}
<section class="section">
  <h1>{{ .Title }}</h1>
  <div class="post-list">
    {{ range .Pages }}
      <article class="post-item">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
        <p>{{ .Summary }}</p>
      </article>
    {{ else }}
      <p>这里还没有内容。</p>
    {{ end }}
  </div>
</section>
{{ end }}
